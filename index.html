<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Mirror</title>

    <!-- Tailwind CSS for styling -->
    <script src="https://jsdelivr.net"></script>

    <!-- Import Map: Tells the browser where to download packages when it sees an "import" statement -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh",
          "react-dom": "https://esm.sh",
          "react-dom/client": "https://esm.sh/client",
          "recharts": "https://esm.sh"
        }
      }
    </script>

    <!-- ES Module Shims for older browser compatibility -->
    <script async src="https://esm.sh"></script>
    
    <!-- Babel standalone to compile JSX directly in browser -->
    <script src="https://unpkg.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <!-- Note type="text/babel" and data-type="module" so imports/exports and JSX both work together -->
    <script type="text/babel" data-type="module" src="inner_mirror.jsx"></script>
</body>
</html>
