<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Mirror</title>

    <!-- Tailwind CSS for styling -->
    <script src="https://jsdelivr.net"></script>

    <!-- Import Map to resolve packages -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh",
          "react-dom": "https://esm.sh",
          "react-dom/client": "https://esm.sh/client",
          "recharts": "https://esm.sh"
        }
      }
    </script>

    <!-- ES Module Shims for browser compatibility -->
    <script async src="https://esm.sh"></script>
    
    <!-- Babel standalone to compile JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <!-- ADDED data-presets="env,react" to explicitly enable the module compiler environment -->
    <script type="text/babel" data-type="module" data-presets="env,react" src="inner_mirror.jsx"></script>
</body>
</html>
